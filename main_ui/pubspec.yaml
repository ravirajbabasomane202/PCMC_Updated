name: main_ui
description: "PCMC Grievance System - Production App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Networking
  dio: ^5.5.0
  http: ^1.1.0
  http_parser: ^4.0.2

  # State management
  flutter_riverpod: ^2.5.1

  # Auth & storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^10.0.0-beta.4
  jwt_decoder: ^2.0.1

  # Notifications (no Firebase required)
  flutter_local_notifications: ^18.0.1

  # Location
  geolocator: ^9.0.2

  # Files & media
  image_picker: ^0.8.5+3
  file_picker: ^10.3.2
  open_file: ^3.5.10
  path_provider: ^2.1.5
  mime: ^2.0.0
  image: ^4.5.4

  # UI
  fl_chart: ^1.0.0
  lottie: ^3.3.2
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.0

  # Utilities
  logging: ^1.0.2
  package_info_plus: ^8.0.0
  permission_handler: ^12.0.1
  url_launcher: ^6.3.0
  universal_io: ^2.2.2
  universal_html: ^2.2.4

  # PDF
  pdf: ^3.11.1

  # i18n
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  intl_utils: ^2.8.3
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/submit_banner.png
    - assets/images/track_banner.png
    - assets/images/resolve_banner.png
    - assets/animations/niwaran.json
    - assets/images/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
